<!doctype html>
<html lang="ca">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/src/input.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <title>CaptionIt - Rànquing</title>
</head>

<body
  class="relative min-h-screen bg-gradient-to-tr from-orange-200 via-orange-300 to-orange-600 text-white font-sans antialiased overflow-x-hidden">
  <main class="relative z-10 mx-auto flex min-h-screen items-center justify-center px-4 py-10">
    <div class="w-full max-w-2xl">
      <div class="text-center mb-8">
        <h1 class="text-5xl font-bold tracking-tight text-white drop-shadow-sm mb-4">PUNTUACIÓ RONDA</h1>
        <p id="round-counter" class="text-2xl text-white/80"></p>
      </div>

      <div id="ranking-list" class="space-y-3">
      </div>

      <p id="countdown" class="text-center text-xl font-bold text-white/80 mt-8">Següent ronda en: <span>5</span>s</p>
    </div>
  </main>

  <div
    class="fixed bottom-0 right-0 z-0 w-72 md:w-96 opacity-25 translate-x-12 translate-y-12 pointer-events-none select-none">
    <img src="/vite.svg" alt="CaptionIt Logo Background" class="w-full h-auto" />
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
