<!doctype html>
<html lang="ca">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/svg+xml" href="/vite.svg" />
        <link rel="stylesheet" href="/src/input.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <title>CaptionIt</title>
</head>

<body
    class="relative min-h-screen bg-gradient-to-tr from-pink-300 via-pink-400 to-fuchsia-600 text-white font-sans antialiased">

    <a id="leave-room-btn" href="../createOrJoinRoom/index.html"
        class="absolute top-4 left-4 flex items-center gap-2 rounded-2xl border border-white/40 bg-white/10 px-4 py-2.5 text-sm font-semibold text-white shadow-sm transition duration-200 hover:bg-white/20 hover:-translate-y-0.5 active:translate-y-0 sm:top-6 sm:left-6">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"
            class="h-4 w-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
        </svg>
        Abandonar sala
    </a>

    <main class="mx-auto flex min-h-screen items-center justify-center px-4 py-10">

        <div
            class="w-full max-w-3xl flex flex-col md:flex-row rounded-[2rem] border border-white/30 bg-white/20 p-6 md:p-8 shadow-2xl backdrop-blur-md gap-6">

            <div class="w-full md:w-1/2 flex flex-col">
                <div
                    class="flex flex-row justify-between items-center text-lg font-semibold text-white mb-4 border-b border-white/20 pb-3">
                    <h2 class="text-xl font-bold">Esperant jugadors</h2>
                    <span id="number-of-players" class="bg-white/20 px-3 py-1 rounded-xl text-sm font-semibold"></span>
                </div>

                <div id="player-list" class="flex flex-col gap-2 max-h-[280px] overflow-y-auto pr-1">
                </div>
            </div>

            <div class="flex flex-col w-full md:w-1/2 justify-between gap-6 md:pt-1">
                <div class="flex flex-col gap-2">
                    <span class="block text-base font-semibold text-white/90">Codi de la Sala</span>
                    <div class="flex flex-row w-full gap-3 items-center">
                        <div id="coderoom"
                            class="flex-1 text-center font-mono text-2xl font-bold tracking-wider text-slate-800 bg-white/90 py-3.5 rounded-2xl shadow-inner">
                        </div>
                        <button id="copycoderoom" type="button"
                            class="shrink-0 rounded-2xl bg-gradient-to-r from-blue-500 to-indigo-600 px-5 py-4 text-base font-semibold text-white shadow-lg shadow-blue-500/30 transition duration-200 hover:-translate-y-0.5 hover:shadow-xl hover:shadow-blue-500/40 active:translate-y-0">
                            <i class="fa-regular fa-copy"></i>
                        </button>
                    </div>
                </div>

                <div class="w-full mt-auto">
                    <button id="play-game-btn" type="button"
                        class="hidden w-full text-center rounded-2xl bg-gradient-to-r from-green-600 to-green-800 px-4 py-4 text-base font-semibold text-white shadow-lg shadow-green-700/30 transition duration-200 hover:-translate-y-0.5 hover:shadow-xl hover:shadow-green-500/40 active:translate-y-0">
                        <i class="fa-solid fa-play text-2xl"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer class="absolute bottom-4 left-0 right-0 z-10 text-center pointer-events-none">
        <p class="text-lg text-white/60 font-medium tracking-wide">
            © 2026 CaptionIt
        </p>
    </footer>

        <div
        class="fixed bottom-0 right-0 z-0 w-72 md:w-96 opacity-25 translate-x-12 translate-y-12 pointer-events-none select-none">
            <img src="/vite.svg" alt="CaptionIt Logo Background" class="w-full h-auto" />
    </div>

        <script type="module" src="/src/main.js"></script>
</body>

</html>
