<!doctype html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="../public/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../src/input.css">
    <title>CaptionIt</title>
  </head>
  <body class="bg-gradient-to-b from-purple-900 to-indigo-900 min-h-screen flex items-center justify-center p-4">
    <div class="config-container bg-white rounded-lg shadow-2xl p-8 max-w-2xl w-full">
      <h1 class="text-4xl font-bold text-center text-gray-800 mb-8">Configurar Sala</h1>
      <form id="config-form" class="space-y-6">
        <div class="config-group">
          <label for="modality" class="block text-lg font-semibold text-gray-700 mb-2">Opció: Modalitat</label>
          <select id="modality" name="modality" required class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-purple-500 bg-white text-gray-800">
            <option value="">Selecciona una modalitat</option>
          </select>
        </div>

        <div class="config-group">
          <label for="num-rounds" class="block text-lg font-semibold text-gray-700 mb-2">Opció: Nombre de Rondas</label>
          <select id="num-rounds" name="num-rounds" required class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-purple-500 bg-white text-gray-800">
            <option value="">Selecciona nombre de rondas</option>
            <option value="1">1 ronda</option>
            <option value="2">2 rondas</option>
            <option value="4">4 rondas</option>
            <option value="6">6 rondas</option>
            <option value="8">8 rondas</option>
            <option value="10">10 rondas</option>
            <option value="12">12 rondas</option>
          </select>
        </div>

        <div class="config-group">
          <label for="max-players" class="block text-lg font-semibold text-gray-700 mb-2">Opció: Nombre Màxim de Jugadors</label>
          <select id="max-players" name="max-players" required class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-purple-500 bg-white text-gray-800">
            <option value="">Selecciona nombre maxim de jugadors</option>
            <option value="2">2 jugadors</option>
            <option value="4">4 jugadors</option>
            <option value="6">6 jugadors</option>
            <option value="8">8 jugadors</option>
            <option value="10">10 jugadors</option>
            <option value="12">12 jugadors</option>
          </select>
        </div>

        <div class="config-group">
          <label for="round-time" class="block text-lg font-semibold text-gray-700 mb-2">Opció: Temps de Ronda (segons)</label>
          <select id="round-time" name="round-time" required class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-purple-500 bg-white text-gray-800">
            <option value="">Selecciona temps de ronda</option>
            <option value="30">30 segons</option>
            <option value="60">60 segons</option>
            <option value="90">90 segons</option>
            <option value="120">120 segons</option>
          </select>
        </div>

        <div id="message" class="mt-4 p-4 text-center text-gray-700"></div>
        <button type="submit" class="btn-create-room w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-6 rounded-lg transition duration-300 mt-8">Crear Sala</button>
      </form>
    </div>
    <script type="module" src="../src/main.js"></script>
  </body>
</html>
