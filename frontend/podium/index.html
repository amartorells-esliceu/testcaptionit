<!doctype html>
<html lang="ca">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/src/input.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <title>CaptionIt</title>
</head>

<body
  class="relative min-h-screen bg-gradient-to-tr from-blue-200 via-blue-400 to-blue-600 text-white font-sans antialiased overflow-x-hidden">
  <main class="relative z-10 mx-auto flex min-h-screen items-center justify-center px-4 py-10">
    <div class="w-full max-w-4xl">
      <div class="text-center mb-12">
        <h1 class="text-6xl font-black tracking-tight text-white drop-shadow-lg mb-2">PODI FINAL</h1>
        <p class="text-2xl text-white/80">Felicitacions als guanyadors!</p>
      </div>

      <div class="flex justify-center items-end gap-8 mb-12 h-96" id="podium-area">
        <div class="flex flex-col items-center justify-end gap-4">
          <div class="flex h-52 w-40 items-end justify-center rounded-3xl bg-slate-100/10 p-4 shadow-inner">
            <span class="text-4xl font-black text-white">2</span>
          </div>
          <div class="text-center">
            <p id="second-name" class="text-xl font-semibold">---</p>
            <p id="second-score" class="text-sm text-white/80">0 punts</p>
          </div>
        </div>

        <div class="flex flex-col items-center justify-end gap-4">
          <div
            class="flex h-72 w-48 items-end justify-center rounded-3xl bg-blue-600/20 p-4 shadow-2xl shadow-blue-500/20">
            <span class="text-5xl font-black text-white">1</span>
          </div>
          <div class="text-center">
            <p id="first-name" class="text-2xl font-semibold">---</p>
            <p id="first-score" class="text-sm text-white/80">0 punts</p>
          </div>
        </div>

        <div class="flex flex-col items-center justify-end gap-4">
          <div class="flex h-44 w-36 items-end justify-center rounded-3xl bg-blue-400/20 p-4 shadow-inner">
            <span class="text-3xl font-bold text-white">3</span>
          </div>
          <div class="text-center">
            <p id="third-name" class="text-xl font-semibold">---</p>
            <p id="third-score" class="text-sm text-white/80">0 punts</p>
          </div>
        </div>
      </div>

      <div class="space-y-2 mt-12 mb-12">
        <p class="text-center text-white/80">Classificació final</p>
        <div id="podium-list" class="space-y-3"></div>
      </div>

      <div class="flex gap-4 justify-center">
        <button id="new-game-btn"
          class="rounded-2xl bg-gradient-to-r from-green-600 to-emerald-600 px-8 py-4 text-base font-semibold text-white shadow-lg hover:-translate-y-0.5 active:translate-y-0">
          <i class="fa-solid fa-redo mr-2"></i>Començar nova partida
        </button>
        <button id="leave-podium-btn"
          class="rounded-2xl bg-gradient-to-r from-red-600 to-pink-600 px-8 py-4 text-base font-semibold text-white shadow-lg hover:-translate-y-0.5 active:translate-y-0">
          <i class="fa-solid fa-sign-out-alt mr-2"></i>Abandonar partida
        </button>
      </div>
    </div>
  </main>

  <div
    class="fixed bottom-0 right-0 z-0 w-72 md:w-96 opacity-25 translate-x-12 translate-y-12 pointer-events-none select-none">
    <img src="/vite.svg" alt="CaptionIt Logo Background" class="w-full h-auto" />
  </div>

  <script type="module" src="/src/podium.js"></script>t>
</body>

</html>
