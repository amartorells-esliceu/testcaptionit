<!doctype html>
<html lang="ca">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="../public/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../src/input.css">
  <title>CaptionIt</title>
</head>

<body class="min-h-screen bg-gradient-to-tr from-pink-300 via-pink-400 to-fuchsia-600 text-white font-sans antialiased">

  <a href="../index.html"
    class="absolute top-4 left-4 flex items-center gap-2 rounded-2xl border border-white/40 bg-white/10 px-4 py-2.5 text-sm font-semibold text-white shadow-sm transition duration-200 hover:bg-white/20 hover:-translate-y-0.5 active:translate-y-0 sm:top-6 sm:left-6">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"
      class="h-4 w-4">
      <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
    </svg>
    Tornar
  </a>

  <main class="mx-auto flex min-h-screen items-center justify-center px-4 py-10">

    <div class="w-full max-w-xl rounded-[2rem] border border-white/30 bg-white/20 p-8 shadow-2xl backdrop-blur-md">
      <h1 id="welcome" class="text-2xl font-bold text-center text-white drop-shadow-sm"></h1>

      <section class="mt-8 flex flex-col gap-4 sm:flex-row">
        <button id="create-room-btn" type="button"
          class="flex-1 rounded-2xl bg-gradient-to-r from-blue-500 to-indigo-600 px-4 py-3 text-sm font-semibold text-white shadow-lg shadow-blue-500/30 transition duration-200 hover:-translate-y-0.5 hover:shadow-xl hover:shadow-blue-500/40 active:translate-y-0">
          Crear sala
        </button>

        <button id="show-join-btn" type="button"
          class="flex-1 rounded-2xl border border-white/40 bg-white/10 px-4 py-3 text-sm font-semibold text-white shadow-sm transition duration-200 hover:bg-white/20 hover:-translate-y-0.5 active:translate-y-0">
          Unir-se amb codi
        </button>
      </section>

      <section id="join-section"
        class="hidden mt-8 rounded-[1.5rem] border border-white/20 bg-white/10 p-6 backdrop-blur-md">
        <form id="join-form" class="space-y-5">
          <div>
            <label for="room-code" class="block text-sm font-semibold text-white/90">Room Code</label>
            <input id="room-code" name="room-code" type="text" placeholder="Introdueix el codi" required
              class="mt-3 w-full rounded-2xl border-0 bg-white/90 px-4 py-3 text-slate-800 placeholder-slate-400 shadow-inner outline-none transition focus:bg-white focus:ring-4 focus:ring-blue-400/50" />
          </div>

          <button type="submit"
            class="w-full rounded-2xl bg-gradient-to-r from-blue-500 to-indigo-600 px-4 py-3 text-sm font-semibold text-white shadow-lg shadow-blue-500/30 transition duration-200 hover:-translate-y-0.5 hover:shadow-xl hover:shadow-blue-500/40 active:translate-y-0">
            Accedir
          </button>
        </form>

        <p class="error-message mt-3 text-sm font-medium text-amber-300 drop-shadow-sm"></p>
      </section>
    </div>

  </main>

  <footer class="absolute bottom-4 left-0 right-0 z-10 text-center pointer-events-none">
    <p class="text-lg text-white/60 font-medium tracking-wide">
      © 2026 CaptionIt
    </p>
  </footer>

  <div
    class="fixed bottom-0 right-0 z-0 w-72 md:w-96 opacity-25 translate-x-12 translate-y-12 pointer-events-none select-none">
    <img src="/vite.svg" alt="CaptionIt Logo Background" class="w-full h-auto" />
  </div>

  <script type="module" src="../src/main.js"></script>
</body>

</html>
