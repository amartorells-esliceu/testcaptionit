<!doctype html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="../public/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../src/input.css">
    <title>CaptionIt</title>
  </head>
  <body class="min-h-screen bg-gradient-to-r from-pink-500 to-fuchsia-700 text-slate-900">
    <main class="mx-auto flex min-h-screen items-center justify-center px-4 py-10">
      <div class="w-full max-w-xl rounded-[2rem] border border-slate-200 bg-white/95 p-8 shadow-2xl shadow-slate-300/30 backdrop-blur-sm">
        <h1 id="welcome" class="text-2xl font-semibold text-center"></h1>

        <section class="mt-8 flex flex-col gap-4 sm:flex-row">
          <button id="create-room-btn" type="button" class="flex-1 rounded-2xl bg-gradient-to-r from-emerald-600 to-teal-500 px-4 py-3 text-sm font-semibold text-white shadow-lg shadow-emerald-200/30 transition hover:-translate-y-0.5">Crear sala</button>
          <button id="show-join-btn" type="button" class="flex-1 rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm font-semibold text-slate-700 shadow-sm transition hover:bg-slate-50">Unir-se amb codi</button>
        </section>

        <section id="join-section" class="hidden mt-8 rounded-[1.5rem] border border-slate-200 bg-slate-50/95 p-6">
          <form id="join-form" class="space-y-5">
            <div>
              <label for="room-code" class="block text-sm font-semibold text-slate-700">Room Code</label>
              <input id="room-code" name="room-code" type="text" placeholder="Introdueix el codi" required class="mt-3 w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-100" />
            </div>
            <button type="submit" class="w-full rounded-2xl bg-gradient-to-r from-blue-600 to-indigo-600 px-4 py-3 text-sm font-semibold text-white shadow-lg shadow-indigo-200/30 transition hover:-translate-y-0.5">Accedir</button>
          </form>
          <p id="join-message" class="error-message mt-3 text-sm text-red-600"></p>
        </section>
      </div>
    </main>

    <script type="module" src="../src/main.js"></script>
  </body>
</html>
