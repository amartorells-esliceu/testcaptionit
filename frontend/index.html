<!doctype html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="public/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/input.css">
    <title>CaptionIt</title>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-900">
    <main class="mx-auto flex min-h-screen items-center justify-center px-4 py-10">
      <div class="w-full max-w-md rounded-[2rem] border border-slate-200 bg-white/95 p-8 shadow-2xl shadow-slate-300/30 backdrop-blur-sm">
        <h1 class="mb-6 text-4xl font-semibold">Entrar</h1>
        <form class="space-y-6">
          <div>
            <label for="username" class="block text-sm font-semibold text-slate-700">Nom d'usuari</label>
            <input id="username" name="username" type="text" placeholder="Escriu el teu nom" required autofocus class="mt-3 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-100" />
          </div>
          <button type="submit" class="w-full rounded-2xl bg-gradient-to-r from-blue-600 to-indigo-600 px-4 py-3 text-sm font-semibold text-white shadow-lg shadow-indigo-200/30 transition hover:-translate-y-0.5">Entrar</button>
        </form>
        <p id="message" class="error-message mt-4 text-sm text-red-600"></p>
      </div>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
