<!doctype html>
<html lang="ca">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./src/input.css">
  <title>CaptionIt</title>
</head>

<body
  class="relative min-h-screen bg-gradient-to-tr from-pink-300 via-pink-400 to-fuchsia-600 text-white text-center font-sans antialiased overflow-x-hidden">

  <main class="relative z-10 mx-auto flex min-h-screen items-center justify-center px-4 py-10">

    <div class="w-full max-w-md rounded-[2rem] border border-white/30 bg-white/20 p-8 shadow-2xl backdrop-blur-md">
      <h1 class="mb-6 text-4xl font-bold tracking-tight text-white drop-shadow-sm">Tria un nom d'usuari</h1>

      <form class="space-y-6">
        <div>
          <input id="username" name="username" type="text" placeholder="Escriu el teu nom" required autofocus
            class="mt-1 w-full rounded-2xl border-0 bg-white/90 px-5 py-3.5 text-slate-800 placeholder-slate-400 shadow-inner outline-none transition focus:bg-white focus:ring-4 focus:ring-blue-400/50" />
        </div>

        <button type="submit"
          class="w-full rounded-2xl bg-gradient-to-r from-blue-500 to-indigo-600 px-4 py-3.5 text-base font-semibold text-white shadow-lg shadow-blue-500/30 transition duration-200 hover:-translate-y-0.5 hover:shadow-xl hover:shadow-blue-500/40 active:translate-y-0">
          Entrar
        </button>
      </form>

      <p class="error-message mt-4 text-sm font-medium text-amber-300 drop-shadow-sm"></p>
    </div>
  </main>

  <footer class="absolute bottom-4 left-0 right-0 z-10 text-center pointer-events-none">
    <p class="text-lg text-white/60 font-medium tracking-wide">
      © 2026 CaptionIt
    </p>
  </footer>

  <div
    class="fixed bottom-0 right-0 z-0 w-72 md:w-96 opacity-25 translate-x-12 translate-y-12 pointer-events-none select-none">
    <img src="/vite.svg" alt="CaptionIt Logo Background" class="w-full h-auto" />
  </div>

  <script type="module" src="./src/main.js"></script>
</body>

</html>
