<!doctype html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../src/input.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <title>CaptionIt - Votacions</title>
</head>
<body class="relative min-h-screen bg-gradient-to-tr from-pink-300 via-pink-400 to-fuchsia-600 text-white font-sans antialiased overflow-x-hidden">
  <main class="relative z-10 mx-auto flex min-h-screen items-center justify-center px-4 py-10">
    <div class="w-full max-w-4xl">
      <div class="text-center mb-8">
        <h1 class="text-4xl font-bold tracking-tight text-white drop-shadow-sm mb-4">¡A VOTAR!</h1>
        <p class="text-xl text-white/80">Selecciona la resposta més divertida</p>
      </div>

      <div class="mb-4 text-center">
        <p class="mx-auto max-w-3xl text-3xl font-extrabold tracking-tight text-white drop-shadow-lg leading-tight">Tria la frase que més t'agradi abans que s'acabi el temps.</p>
      </div>
      <div class="mb-6 flex flex-col items-center gap-2 text-center text-white/90">
        <span class="text-xl font-semibold uppercase tracking-[0.24em] text-white/80">Temps per votar</span>
        <span id="vote-timer" class="text-6xl font-black text-white">0</span>
        <span class="text-2xl text-white/80">segons</span>
      </div>

      <div id="answers-container" class="space-y-3">
      </div>

      <div class="mt-6 text-center">
        <button id="submit-vote-btn" class="mx-auto rounded-2xl bg-gradient-to-r from-emerald-500 to-teal-600 px-6 py-3 text-base font-semibold text-white shadow-lg hover:-translate-y-0.5 active:translate-y-0 disabled:cursor-not-allowed disabled:opacity-50" disabled>
          <i class="fa-solid fa-hand-pointer mr-2"></i>Votar resposta
        </button>
      </div>

      <div class="mt-8 text-center">
        <button id="leave-vote-btn" class="rounded-2xl bg-gradient-to-r from-red-600 to-pink-600 px-6 py-3 text-base font-semibold text-white shadow-lg hover:-translate-y-0.5 active:translate-y-0">
          <i class="fa-solid fa-sign-out-alt mr-2"></i>Abandonar partida
        </button>
      </div>
    </div>
  </main>

  <div class="fixed bottom-0 right-0 z-0 w-72 md:w-96 opacity-25 translate-x-12 translate-y-12 pointer-events-none select-none">
    <img src="/vite.svg" alt="CaptionIt Logo Background" class="w-full h-auto" />
  </div>

  <script type="module" src="../src/main.js"></script>
</body>
</html>
