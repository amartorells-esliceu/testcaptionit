events {}

http {
    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;
        server_name server148.cfgs.esliceu.net;
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host:8080$request_uri;
        }
    }

    server {
        listen 8080 ssl;
        server_name server148.cfgs.esliceu.net;

        ssl_certificate     /etc/letsencrypt/live/server148.cfgs.esliceu.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/server148.cfgs.esliceu.net/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;

        location = /events {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin 'https://captionittest.netlify.app';
                add_header Access-Control-Allow-Methods 'GET, POST, PATCH, DELETE, OPTIONS';
                add_header Access-Control-Allow-Headers 'Content-Type, Authorization, Prefer, Range, Accept-Profile';
                add_header Access-Control-Max-Age 3600;
                return 204;
            }
            add_header Access-Control-Allow-Origin 'https://captionittest.netlify.app' always;
            add_header Access-Control-Allow-Methods 'GET, POST, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Content-Type, Authorization, Prefer, Range, Accept-Profile' always;
            proxy_pass         http://sse:3001;
            proxy_http_version 1.1;
            proxy_set_header   Connection '';
            proxy_set_header   X-Accel-Buffering no;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 86400s;
        }

        location = /broadcast {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin 'https://captionittest.netlify.app';
                add_header Access-Control-Allow-Methods 'GET, POST, PATCH, DELETE, OPTIONS';
                add_header Access-Control-Allow-Headers 'Content-Type, Authorization, Prefer, Range, Accept-Profile';
                add_header Access-Control-Max-Age 3600;
                return 204;
            }
            add_header Access-Control-Allow-Origin 'https://captionittest.netlify.app' always;
            add_header Access-Control-Allow-Methods 'GET, POST, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Content-Type, Authorization, Prefer, Range, Accept-Profile' always;
            proxy_pass http://sse:3001;
        }

        location ~ ^/(answers|votes) {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin 'https://captionittest.netlify.app';
                add_header Access-Control-Allow-Methods 'GET, POST, PATCH, DELETE, OPTIONS';
                add_header Access-Control-Allow-Headers 'Content-Type, Authorization, Prefer, Range, Accept-Profile';
                add_header Access-Control-Max-Age 3600;
                return 204;
            }
            add_header Access-Control-Allow-Origin 'https://captionittest.netlify.app' always;
            add_header Access-Control-Allow-Methods 'GET, POST, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Content-Type, Authorization, Prefer, Range, Accept-Profile' always;
            add_header Access-Control-Expose-Headers 'Content-Range' always;
            set $backend "postgrest:3000";
            if ($request_method = POST) {
                set $backend "sse:3001";
            }
            proxy_pass http://$backend;
        }

        location / {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin 'https://captionittest.netlify.app';
                add_header Access-Control-Allow-Methods 'GET, POST, PATCH, DELETE, OPTIONS';
                add_header Access-Control-Allow-Headers 'Content-Type, Authorization, Prefer, Range, Accept-Profile';
                add_header Access-Control-Max-Age 3600;
                return 204;
            }
            add_header Access-Control-Allow-Origin 'https://captionittest.netlify.app' always;
            add_header Access-Control-Allow-Methods 'GET, POST, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Content-Type, Authorization, Prefer, Range, Accept-Profile' always;
            add_header Access-Control-Expose-Headers 'Content-Range' always;
            proxy_pass http://postgrest:3000;
        }
    }
}
